name: Update XML Feed
on:
  schedule:
    - cron: '0 * * * *' # Kører hver time
  workflow_dispatch: # Giver dig en knap til at starte den manuelt

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml playwright
          playwright install chromium --with-deps

      - name: Run script
        run: python feed.py

      - name: Commit and push feed.xml
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/feed.xml
          git diff --cached --quiet || git commit -m "Update feed.xml"
          git pull --rebase --autostash
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
